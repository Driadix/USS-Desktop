name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      DOTNET_NOLOGO: true
      PUBLISH_DIR: artifacts/publish/USS.Desktop-win-x64
      ZIP_PATH: artifacts/USS.Desktop-win-x64.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore USS.Desktop.slnx --runtime win-x64

      - name: Build
        run: dotnet build USS.Desktop.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test USS.Desktop.slnx --configuration Release --no-build

      - name: Publish portable app
        shell: pwsh
        run: |
          $publishVersion = ""
          if ($env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME.StartsWith("v")) {
            $publishVersion = $env:GITHUB_REF_NAME.Substring(1)
          }

          $publishArguments = @{
            Configuration = "Release"
            Runtime = "win-x64"
            Output = $env:PUBLISH_DIR
          }

          if (-not [string]::IsNullOrWhiteSpace($publishVersion)) {
            $publishArguments["Version"] = $publishVersion
          }

          .\scripts\Publish-Portable.ps1 @publishArguments

      - name: Package artifact
        shell: pwsh
        run: |
          if (Test-Path $env:ZIP_PATH) {
            Remove-Item -LiteralPath $env:ZIP_PATH -Force
          }

          Compress-Archive -Path (Join-Path $env:PUBLISH_DIR '*') -DestinationPath $env:ZIP_PATH -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: USS.Desktop-win-x64
          path: ${{ env.ZIP_PATH }}
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: USS.Desktop-win-x64
          path: artifacts/release

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/release/USS.Desktop-win-x64.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
